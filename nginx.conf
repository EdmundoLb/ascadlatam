# Nginx config para ASCAD LATAM — Vue 3 SPA en DigitalOcean
# Ubicación: /etc/nginx/sites-available/ascadlatam

server {
    listen 80;
    server_name ascadlatam.org www.ascadlatam.org;

    # Redirigir HTTP -> HTTPS (descomenta después de instalar SSL)
    # return 301 https://$host$request_uri;

    root /var/www/ascadlatam/dist;
    index index.html;

    # Gzip para mejor performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # Cache para assets estáticos (JS/CSS/img tienen hash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Vue Router: todas las rutas apuntan a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

